name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 最小权限：只读检出，不向仓库写回，不配置任何 SSH/设备凭据。
permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: make check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run repository checks
        # 与本地入口一致：语法 + fixture 测试 + ShellCheck + 敏感模式。
        # 不注入 ROUTER_*、私钥或真实拓扑环境变量。
        run: make check

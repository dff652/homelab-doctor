# homelab-doctor 脱敏示例配置
# 复制为 config/local.conf 后填写；*.local.conf 默认不入 git。

ROUTER_HOST=192.0.2.1
ROUTER_USER=root
SSH_CONNECT_TIMEOUT=5

# 路由器自身使用的 DNS。远程探针在路由器上执行，因此通常填 127.0.0.1。
DNS_SERVER=127.0.0.1

# split-DNS 服务：域名应由家庭 DNS 返回内网地址。
SPLIT_DOMAIN=service.home.example
SPLIT_EXPECTED_IP=192.0.2.20
SERVICE_URL=https://service.home.example

# 需要 DIRECT 与真实 IP 解析的域名后缀。
DIRECT_DOMAIN_SUFFIX=nas-vendor.example
LAN_CIDR=192.0.2.0/24

# VPN 客户端应使用的 DNS 与地址池。
VPN_DNS=192.0.2.1
VPN_SUBNET=10.8.0.0/24
